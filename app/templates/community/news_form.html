{% extends "layout/base.html" %}

{% block header %}{{ legend }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
    <form method="POST">
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Título de la Noticia</label>
            <input type="text" name="title" value="{{ post.title if post else '' }}" required
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Contenido</label>
            <textarea name="content" rows="6" required
                      class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">{{ post.content if post else '' }}</textarea>
        </div>

        <div class="mb-6 flex items-center">
            <input type="checkbox" name="is_important" id="is_important" 
                   class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
                   {% if post and post.is_important %}checked{% endif %}>
            <label for="is_important" class="ml-2 block text-sm text-gray-900 font-bold">
                Marcar como Importante / Urgente
            </label>
        </div>

        <div class="flex justify-end space-x-4">
            <a href="{{ url_for('comunidad.list_news') }}" class="px-4 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400">Cancelar</a>
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white font-bold rounded hover:bg-blue-700">
                Guardar Noticia
            </button>
        </div>
    </form>
</div>
{% endblock %}
